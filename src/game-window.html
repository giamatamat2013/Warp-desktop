<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>WARP – משחק</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --titlebar: 36px; }
  body {
    background: #000;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    font-family: 'Segoe UI', sans-serif;
  }

  #titlebar {
    height: var(--titlebar);
    background: #0a0a0f;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 10px;
    -webkit-app-region: drag;
    flex-shrink: 0;
    user-select: none;
    z-index: 10;
  }
  #game-title {
    font-size: 13px;
    color: #a0a0b0;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .logo {
    font-size: 13px;
    font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .win-btn {
    -webkit-app-region: no-drag;
    width: 28px; height: 28px;
    border: none; border-radius: 7px;
    background: transparent;
    color: #6b6b85;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .win-btn:hover { background: #1a1a26; color: #e8e8f0; }
  #btn-close:hover { background: #ef4444; color: #fff; }

  /* ── Game frame ── */
  #game-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #game-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── Loading overlay ── */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #6b6b85;
    gap: 14px;
    font-size: 14px;
    z-index: 5;
    transition: opacity .3s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #1a1a26;
    border-top-color: #7c3aed;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error state ── */
  #error-state {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    color: #6b6b85;
    gap: 12px;
    z-index: 6;
  }
  #error-state .err-icon { font-size: 48px; }
  #error-state .err-title { font-size: 16px; color: #e8e8f0; }
  #error-state .err-sub { font-size: 12px; color: #555; }
  #error-state .err-url { font-size: 11px; color: #3a3a55; margin-top: 4px; word-break: break-all; max-width: 480px; text-align: center; }
  .open-btn {
    margin-top: 8px;
    padding: 8px 20px;
    background: #7c3aed;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s;
  }
  .open-btn:hover { background: #a855f7; }
</style>
</head>
<body>

<div id="titlebar">
  <span class="logo">⚡</span>
  <span id="game-title">טוען משחק...</span>
  <button class="win-btn" id="btn-min" title="מזעור">─</button>
  <button class="win-btn" id="btn-max" title="הגדל">□</button>
  <button class="win-btn" id="btn-close" title="סגור">✕</button>
</div>

<div id="game-container">
  <div id="loading">
    <div class="spinner"></div>
    <span id="loading-text">טוען משחק...</span>
  </div>

  <div id="error-state">
    <div class="err-icon">❌</div>
    <div class="err-title">לא ניתן לטעון את המשחק</div>
    <div class="err-sub">המשחק חסום את הטעינה בתוך אפליקציות (X-Frame-Options)</div>
    <div class="err-url" id="err-url-display"></div>
    <button class="open-btn" id="open-external-btn">🌐 פתח בדפדפן</button>
  </div>

  <!--
    iframe עם sandbox מינימלי — מאפשר סקריפטים וטפסים,
    אך חוסם navigation ו-popups מסוכנים.
    webSecurity: false ב-main.js מבטל את חסימת X-Frame-Options ברמת Electron.
  -->
  <iframe
    id="game-frame"
    src="about:blank"
    sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-downloads"
    allow="autoplay; fullscreen; gamepad"
    allowfullscreen
    referrerpolicy="no-referrer"
  ></iframe>
</div>

<script>
  const frame      = document.getElementById('game-frame');
  const loading    = document.getElementById('loading');
  const errorState = document.getElementById('error-state');
  const titleEl    = document.getElementById('game-title');
  const loadingTxt = document.getElementById('loading-text');
  const errUrlEl   = document.getElementById('err-url-display');

  let currentUrl   = '';
  let loadTimeout  = null;

  // ── כפתורי חלון ────────────────────────────────────────────────────────────
  document.getElementById('btn-min').onclick   = () => window.warp.windowMinimize();
  document.getElementById('btn-max').onclick   = () => window.warp.windowMaximize();
  document.getElementById('btn-close').onclick = () => window.warp.windowClose();

  // ── פתח בדפדפן חיצוני ──────────────────────────────────────────────────────
  document.getElementById('open-external-btn').onclick = () => {
    if (currentUrl) window.warp.openExternal(currentUrl);
  };

  // ── קבל את המשחק מה-main process ───────────────────────────────────────────
  window.warp.onLoadGame(game => {
    currentUrl = game.url;
    titleEl.textContent  = game.name || game.title || 'משחק';
    document.title       = game.name || 'WARP';
    loadingTxt.textContent = `טוען: ${game.name || game.title || 'משחק'}...`;

    // הצג loading, הסתר error
    loading.classList.remove('hidden');
    errorState.style.display = 'none';

    // timeout — אם אחרי 10 שניות לא נטען, הצג שגיאה
    clearTimeout(loadTimeout);
    loadTimeout = setTimeout(() => checkIfLoaded(), 10000);

    frame.src = game.url;
  });

  // ── בדיקת טעינה ────────────────────────────────────────────────────────────
  function checkIfLoaded() {
    try {
      // אם ה-iframe נחסם (cross-origin + X-Frame-Options), contentDocument יזרוק שגיאה
      // או שהגוף יהיה ריק לגמרי
      const doc = frame.contentDocument || frame.contentWindow?.document;
      if (!doc || doc.URL === 'about:blank' || (doc.body && doc.body.innerHTML === '')) {
        showError();
      }
    } catch (e) {
      // cross-origin error = המשחק נטען בהצלחה (אי אפשר לגשת ל-DOM שלו)
      hideLoading();
    }
  }

  frame.onload = () => {
    clearTimeout(loadTimeout);
    try {
      const doc = frame.contentDocument || frame.contentWindow?.document;
      if (!doc || doc.URL === 'about:blank') return;
      // cross-origin → נטען בהצלחה
      hideLoading();
    } catch {
      // cross-origin = הצלחה
      hideLoading();
    }
  };

  frame.onerror = () => {
    clearTimeout(loadTimeout);
    showError();
  };

  function hideLoading() {
    loading.classList.add('hidden');
    errorState.style.display = 'none';
  }

  function showError() {
    loading.classList.add('hidden');
    errorState.style.display = 'flex';
    errUrlEl.textContent = currentUrl;
  }
</script>
</body>
</html>
