<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARP Desktop</title>
<style>
  :root {
    --bg:       #0a0a0f;
    --bg2:      #12121a;
    --bg3:      #1a1a26;
    --accent:   #7c3aed;
    --accent2:  #a855f7;
    --glow:     rgba(124,58,237,0.35);
    --text:     #e8e8f0;
    --muted:    #6b6b85;
    --border:   rgba(255,255,255,0.07);
    --card:     #14141e;
    --radius:   14px;
    --titlebar: 38px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', 'Arial', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Titlebar ── */
  #titlebar {
    height: var(--titlebar);
    background: rgba(10,10,15,0.95);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    -webkit-app-region: drag;
    flex-shrink: 0;
    gap: 10px;
    user-select: none;
  }
  #titlebar .logo {
    font-size: 15px;
    font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  #titlebar .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; margin-right: 2px;
    box-shadow: 0 0 6px #22c55e;
    flex-shrink: 0;
  }
  #titlebar .status-dot.offline { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  #titlebar .spacer { flex: 1; }
  .win-btn {
    -webkit-app-region: no-drag;
    width: 28px; height: 28px;
    border: none; border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .win-btn:hover { background: var(--bg3); color: var(--text); }
  #btn-close:hover { background: #ef4444; color: #fff; }

  /* ── Layout ── */
  #app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 200px;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 0;
    flex-shrink: 0;
    overflow-y: auto;
  }
  .nav-section { padding: 0 14px 6px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 14px;
    cursor: pointer;
    border-radius: 0;
    font-size: 13.5px;
    color: var(--muted);
    transition: all .15s;
    border-right: 3px solid transparent;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { color: var(--accent2); border-right-color: var(--accent); background: rgba(124,58,237,0.1); }
  .nav-item .icon { font-size: 15px; width: 20px; text-align: center; }

  /* ── Main ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  #main::-webkit-scrollbar { width: 5px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 10px; }

  /* ── Search / Header ── */
  .page-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .page-title { font-size: 22px; font-weight: 700; flex: 1; }
  .search-box {
    position: relative;
    flex-shrink: 0;
  }
  .search-box input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 36px 8px 14px;
    color: var(--text);
    font-size: 13px;
    width: 220px;
    outline: none;
    transition: border .2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box .icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

  /* ── Category pills ── */
  .cats {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .cat-pill {
    padding: 5px 13px;
    border-radius: 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    color: var(--muted);
    user-select: none;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--text); }
  .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Games grid ── */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 16px;
  }
  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .game-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 18px var(--glow);
    transform: translateY(-3px);
  }
  .game-card .thumb {
    width: 100%; aspect-ratio: 16/9;
    object-fit: cover;
    background: var(--bg3);
    display: block;
  }
  .game-card .thumb-placeholder {
    width: 100%; aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--bg3), var(--bg2));
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .game-card .info { padding: 10px 12px; }
  .game-card .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .game-card .tags { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .game-card .save-btn {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    opacity: 0;
    transition: opacity .15s;
    backdrop-filter: blur(6px);
  }
  .game-card:hover .save-btn { opacity: 1; }
  .game-card .save-btn.saved { color: #a855f7; border-color: #a855f7; }
  .game-card .offline-badge {
    position: absolute; top: 8px; right: 8px;
    background: rgba(124,58,237,0.85);
    border-radius: 6px;
    padding: 2px 7px;
    font-size: 10px;
    color: #fff;
    backdrop-filter: blur(4px);
  }

  /* ── כרטיס לא זמין (אופליין, לא הורד) ── */
  .game-card.unavailable {
    opacity: 0.38;
    cursor: not-allowed;
    pointer-events: none;
    filter: grayscale(1);
  }
  .game-card.unavailable:hover {
    transform: none;
    box-shadow: none;
    border-color: var(--border);
  }
  .game-card .unavailable-badge {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55);
    font-size: 12px;
    color: #aaa;
    gap: 5px;
    pointer-events: none;
    backdrop-filter: blur(1px);
  }

  /* ── Empty / loading ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .big { font-size: 48px; margin-bottom: 12px; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--bg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 60px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 22px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transition: transform .3s cubic-bezier(.175,.885,.32,1.275);
    z-index: 999;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Offline notice ── */
  .offline-banner {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: #fca5a5;
    margin-bottom: 18px;
    display: none;
  }
  .offline-banner.show { display: block; }

  /* ── User avatar (titlebar) ── */
  .user-avatar {
    -webkit-app-region: no-drag;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    user-select: none;
  }
  .user-avatar .anon-dot, .user-avatar .auth-dot {
    position: absolute; bottom: -1px; right: -1px;
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid var(--bg);
  }
  .user-avatar .anon-dot { background: #6b6b85; }
  .user-avatar .auth-dot { background: #22c55e; }

  /* ── User dropdown ── */
  .user-dropdown {
    position: absolute;
    top: calc(var(--titlebar) + 4px);
    left: 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 0;
    min-width: 200px;
    z-index: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: none;
  }
  .user-dropdown.open { display: block; }
  .ud-name { padding: 4px 16px; font-size: 13px; font-weight: 600; }
  .ud-email { padding: 2px 16px 10px; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .ud-btn {
    display: block; width: 100%; text-align: right;
    padding: 8px 16px; font-size: 13px;
    background: none; border: none; color: var(--text);
    cursor: pointer; transition: background .15s;
  }
  .ud-btn:hover { background: var(--bg3); }
  .ud-btn.danger { color: #f87171; }

  /* ── Auth modal ── */
  .auth-modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 900;
    display: none;
    align-items: center; justify-content: center;
  }
  .auth-modal-bg.open { display: flex; }
  .auth-modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 28px 24px;
    width: 360px;
    position: relative;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .auth-close {
    position: absolute; top: 14px; left: 14px;
    background: none; border: none; color: var(--muted);
    font-size: 16px; cursor: pointer; line-height: 1;
  }
  .auth-close:hover { color: var(--text); }
  .auth-logo { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 18px;
    background: linear-gradient(135deg,#a855f7,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 10px; border-radius: 10px;
    background: #fff; color: #222; font-size: 14px; font-weight: 500;
    border: none; cursor: pointer; margin-bottom: 14px; transition: opacity .15s;
  }
  .btn-google:hover { opacity: .9; }
  .auth-divider { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 14px; position: relative; }
  .auth-divider::before, .auth-divider::after {
    content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border);
  }
  .auth-divider::before { right:0; } .auth-divider::after { left:0; }
  .auth-tabs { display:flex; gap:8px; margin-bottom:14px; }
  .auth-tab {
    flex:1; padding:7px; background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; color:var(--muted); font-size:13px; cursor:pointer; transition:all .15s;
  }
  .auth-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .auth-field { margin-bottom:10px; }
  .auth-field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .auth-field input {
    width:100%; padding:9px 12px;
    background:var(--bg3); border:1px solid var(--border); border-radius:9px;
    color:var(--text); font-size:13px; outline:none; transition:border .2s;
  }
  .auth-field input:focus { border-color:var(--accent); }
  .auth-submit {
    width:100%; padding:10px; border-radius:10px;
    background:var(--accent); border:none; color:#fff;
    font-size:14px; font-weight:600; cursor:pointer;
    margin-top:6px; transition:all .2s;
  }
  .auth-submit:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(124,58,237,.4); }
  .auth-submit:disabled { opacity:.5; cursor:default; transform:none; }
  .auth-err { color:#f87171; font-size:12px; margin-bottom:8px; display:none; }
  .auth-anon {
    display:block; text-align:center; margin-top:12px;
    font-size:12px; color:var(--muted); cursor:pointer;
    background:none; border:none; width:100%;
  }
  .auth-anon:hover { color:var(--text); }
  .auth-forgot { background:none; border:none; color:var(--muted); font-size:11px; cursor:pointer; margin-top:4px; }
  .auth-forgot:hover { color:var(--text); }
</style>
</head>
<body>

<!-- Titlebar -->
<div id="titlebar">
  <span class="logo">⚡ WARP</span>
  <span style="font-size:11px;color:var(--muted)">Desktop</span>
  <div id="status-dot" class="status-dot"></div>
  <div class="spacer"></div>
  <div class="user-avatar" id="userAvatar" onclick="toggleDropdown()">
    <span id="userInitial">?</span>
    <span class="anon-dot" id="userDot"></span>
  </div>
  <div class="user-dropdown" id="userDropdown">
    <div class="ud-name" id="udName">טוען...</div>
    <div class="ud-email" id="udEmail"></div>
    <button class="ud-btn" id="udAuthBtn" onclick="openAuth();closeDropdown()">🔐 כניסה / הרשמה</button>
    <button class="ud-btn danger" id="udSignout" onclick="signOutUser()" style="display:none">🚪 התנתקות</button>
  </div>
  <button class="win-btn" id="btn-min" title="מזעור">─</button>
  <button class="win-btn" id="btn-max" title="הגדל">□</button>
  <button class="win-btn" id="btn-close" title="סגור">✕</button>
</div>

<!-- Auth Modal -->
<div class="auth-modal-bg" id="authBg" onclick="if(event.target===this)closeAuth()">
  <div class="auth-modal">
    <button class="auth-close" onclick="closeAuth()">✕</button>
    <div class="auth-logo">⚡ WARP</div>
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      התחברות עם Google
    </button>
    <div class="auth-divider">או עם מייל</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">התחברות</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">הרשמה</button>
    </div>
    <div id="authErr" class="auth-err"></div>
    <div id="loginForm">
      <div class="auth-field"><label>אימייל</label><input type="email" id="loginEmail" placeholder="you@example.com"></div>
      <div class="auth-field"><label>סיסמה</label><input type="password" id="loginPass" placeholder="••••••••"></div>
      <button class="auth-submit" id="loginBtn" onclick="signInEmail()">כניסה</button>
      <button class="auth-forgot" onclick="forgotPassword()">שכחתי סיסמה</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="auth-field"><label>שם תצוגה</label><input type="text" id="regName" placeholder="השם שלך"></div>
      <div class="auth-field"><label>אימייל</label><input type="email" id="regEmail" placeholder="you@example.com"></div>
      <div class="auth-field"><label>סיסמה</label><input type="password" id="regPass" placeholder="לפחות 6 תווים"></div>
      <button class="auth-submit" id="registerBtn" onclick="registerEmail()">יצירת חשבון</button>
    </div>
    <button class="auth-anon" onclick="continueAnonymously()">המשך כאורח</button>
  </div>
</div>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="nav-section">ניווט</div>
    <div class="nav-item active" data-page="all">
      <span class="icon">🎮</span> כל המשחקים
    </div>
    <div class="nav-item" data-page="offline">
      <span class="icon">💾</span> שמורים אופליין
      <span id="saved-count" style="margin-right:auto;background:var(--accent);border-radius:10px;padding:1px 7px;font-size:11px;display:none"></span>
    </div>

    <div class="nav-section" style="margin-top:16px">קטגוריות</div>
    <div id="sidebar-cats"></div>
  </nav>

  <!-- Main -->
  <main id="main">
    <div id="offline-banner" class="offline-banner">
      ⚠️ אין חיבור לאינטרנט – מציג משחקים שמורים מהקאש בלבד
    </div>

    <div id="page-all">
      <div class="page-header">
        <h1 class="page-title">כל המשחקים</h1>
        <div class="search-box">
          <input type="text" id="search" placeholder="חפש משחק...">
          <span class="icon">🔍</span>
        </div>
      </div>
      <div class="cats" id="cats-bar"></div>
      <div id="games-container"><div class="spinner"></div></div>
    </div>

    <div id="page-offline" style="display:none">
      <div class="page-header">
        <h1 class="page-title">💾 משחקים שמורים אופליין</h1>
      </div>
      <div id="offline-games-container"></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- ==================== FIREBASE STUBS ==================== -->
<script>
// Stubs so onclick= attrs don't throw before Firebase module loads
['openAuth','closeAuth','switchTab','toggleDropdown','closeDropdown',
 'signInWithGoogle','signInEmail','registerEmail','continueAnonymously',
 'signOutUser','forgotPassword'
].forEach(fn => {
  if (!window[fn]) window[fn] = (...args) => {
    document.addEventListener('_warpReady', () => window[fn](...args), { once: true });
  };
});
</script>

  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  updateProfile, signOut, sendPasswordResetEmail,
  doc, getDoc, setDoc, deleteDoc, collection, getDocs
};

// ── Cloud localStorage proxy ─────────────────────────────────────────────────
const _lsCache = {};

async function loadCloudStorage(uid) {
  try {
    const col = collection(db, 'users', uid, 'localStorage');
    const snap = await getDocs(col);
    snap.forEach(d => { _lsCache[d.id] = d.data().value; });
  } catch(e) { console.warn('[WARP Cloud] Load failed', e); }
}

const cloudLS = {
  setItem(key, value) {
    value = String(value);
    _lsCache[key] = value;
    const uid = auth.currentUser?.uid;
    if (uid) {
      setDoc(doc(db, 'users', uid, 'localStorage', key), { value })
        .catch(e => console.warn('[WARP Cloud] setItem failed', e));
    }
  },
  getItem(key) { return (key in _lsCache) ? _lsCache[key] : null; },
  removeItem(key) {
    delete _lsCache[key];
    const uid = auth.currentUser?.uid;
    if (uid) {
      deleteDoc(doc(db, 'users', uid, 'localStorage', key))
        .catch(e => console.warn('[WARP Cloud] removeItem failed', e));
    }
  },
  clear() { Object.keys(_lsCache).forEach(k => cloudLS.removeItem(k)); },
  key(i) { return Object.keys(_lsCache)[i] ?? null; },
  get length() { return Object.keys(_lsCache).length; }
};

// ── Auth state ────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  window._currentUser = user;
  if (user) {
    if (!user.isAnonymous) await loadCloudStorage(user.uid);

    const isAnon  = user.isAnonymous;
    const name    = user.displayName || (isAnon ? 'אורח' : user.email?.split('@')[0] || 'משתמש');
    const initial = name[0].toUpperCase();

    document.getElementById('userInitial').textContent = initial;
    const dot = document.getElementById('userDot');
    dot.className = isAnon ? 'anon-dot' : 'auth-dot';
    document.getElementById('udName').textContent  = name;
    document.getElementById('udEmail').textContent = isAnon ? 'מצב אורח' : (user.email || '');
    document.getElementById('udAuthBtn').style.display  = isAnon ? '' : 'none';
    document.getElementById('udSignout').style.display  = isAnon ? 'none' : '';

    logEvent(analytics, 'login', { method: isAnon ? 'anonymous' : user.providerData[0]?.providerId, platform: 'desktop' });
  } else {
    signInAnonymously(auth).catch(e => console.error('[WARP Auth]', e));
  }
});

// ── Auth functions ────────────────────────────────────────────────────────────
window.openAuth  = () => { document.getElementById('authBg').classList.add('open'); clearAuthErr(); };
window.closeAuth = () => { document.getElementById('authBg').classList.remove('open'); };

window.toggleDropdown = () => document.getElementById('userDropdown').classList.toggle('open');
window.closeDropdown  = () => document.getElementById('userDropdown').classList.remove('open');
document.addEventListener('click', e => {
  if (!e.target.closest('#userAvatar') && !e.target.closest('#userDropdown'))
    document.getElementById('userDropdown').classList.remove('open');
});

window.switchTab = (tab) => {
  document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active',    tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  clearAuthErr();
};

window.signInWithGoogle = async () => {
  clearAuthErr();
  try {
    const result = await signInWithPopup(auth, googleProvider);
    const isNew = result._tokenResponse?.isNewUser;
    logEvent(analytics, isNew ? 'sign_up' : 'login', { method: 'google.com', platform: 'desktop' });
    closeAuth();
    showToast(isNew ? '🎉 ברוך הבא ל-WARP!' : '✅ התחברת בהצלחה עם Google!');
  } catch(e) { showAuthErr(formatErr(e)); }
};

window.signInEmail = async () => {
  clearAuthErr();
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) return showAuthErr('נא למלא אימייל וסיסמה');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'מתחבר...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    logEvent(analytics, 'login', { method: 'email', platform: 'desktop' });
    closeAuth(); showToast('✅ ברוך הבא!');
  } catch(e) { showAuthErr(formatErr(e)); }
  finally { btn.disabled = false; btn.textContent = 'כניסה'; }
};

window.forgotPassword = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) return showAuthErr('הכנס את האימייל שלך כדי לאפס סיסמה');
  try {
    await sendPasswordResetEmail(auth, email);
    showToast('📧 נשלח מייל לאיפוס סיסמה!');
    clearAuthErr();
  } catch(e) { showAuthErr(formatErr(e)); }
};

window.registerEmail = async () => {
  clearAuthErr();
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!name || !email || !pass) return showAuthErr('נא למלא את כל השדות');
  if (pass.length < 6) return showAuthErr('סיסמה חייבת להיות לפחות 6 תווים');
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'יוצר חשבון...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    logEvent(analytics, 'sign_up', { method: 'email', platform: 'desktop' });
    closeAuth(); showToast('🎉 החשבון נוצר בהצלחה!');
  } catch(e) { showAuthErr(formatErr(e)); }
  finally { btn.disabled = false; btn.textContent = 'יצירת חשבון'; }
};

window.continueAnonymously = async () => {
  if (!auth.currentUser) await signInAnonymously(auth);
  closeAuth(); showToast('👤 נכנסת כאורח');
};

window.signOutUser = async () => {
  await signOut(auth);
  Object.keys(_lsCache).forEach(k => delete _lsCache[k]);
  closeDropdown();
  showToast('👋 התנתקת');
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function formatErr(e) {
  const map = {
    'auth/user-not-found':      'לא נמצא משתמש עם אימייל זה',
    'auth/wrong-password':      'סיסמה שגויה',
    'auth/email-already-in-use':'האימייל כבר בשימוש',
    'auth/invalid-email':       'אימייל לא תקין',
    'auth/weak-password':       'הסיסמה חלשה מדי',
    'auth/popup-closed-by-user':'חלון ההתחברות נסגר',
    'auth/invalid-credential':  'פרטי כניסה שגויים',
  };
  return map[e.code] || e.message;
}
function showAuthErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg; el.style.display = '';
}
function clearAuthErr() { document.getElementById('authErr').style.display = 'none'; }

document.dispatchEvent(new Event('_warpReady'));
</script>

<script>
const CATEGORIES = [
  { id: 'action',     label: '⚡ פעולה' },
  { id: 'puzzle',     label: '🧩 פאזל' },
  { id: 'arcade',     label: '👾 ארקייד' },
  { id: 'racing',     label: '🏎️ מירוצים' },
  { id: 'rpg',        label: '⚔️ RPG' },
  { id: 'strategy',   label: '♟️ אסטרטגיה' },
  { id: 'sports',     label: '⚽ ספורט' },
  { id: 'shooter',    label: '🔫 יריות' },
  { id: 'board',      label: '🎲 לוח' },
  { id: 'survival',   label: '💀 הישרדות' },
  { id: 'fun',        label: '🌟 כיפי' },
  { id: 'adventure',  label: '🗺️ הרפתקה' },
  { id: 'multiplayer',label: '👥 מרובה שחקנים' },
];

let allGames = [], savedGames = [], activeCat = 'all', searchQ = '', currentPage = 'all';

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  buildSidebarCats();
  buildCatsBar();
  setupNav();
  setupWindowControls();
  setupSearch();

  savedGames = await window.warp.getSavedGames();
  updateSavedCount();

  // Wait for Firebase to be ready if needed
  if (!window._firebase) {
    await new Promise(res => document.addEventListener('_warpReady', res, { once: true }));
  }

  const { games, source } = await window.warp.getGames();
  allGames = Array.isArray(games) ? games : Object.values(games);

  const isOffline = (source === 'none' || source === 'cache');
  window._isOffline = isOffline;

  if (isOffline) {
    document.getElementById('offline-banner').classList.add('show');
    document.getElementById('status-dot').classList.add('offline');
    // פתח ישירות לדף האופליין
    setPage('offline');
  } else {
    renderGames();
  }
}

// ── Sidebar categories ────────────────────────────────────────────────────────
function buildSidebarCats() {
  const el = document.getElementById('sidebar-cats');
  CATEGORIES.forEach(c => {
    const div = document.createElement('div');
    div.className = 'nav-item';
    div.dataset.cat = c.id;
    div.innerHTML = `<span class="icon">${c.label.split(' ')[0]}</span> ${c.label.split(' ').slice(1).join(' ')}`;
    div.onclick = () => { activeCat = c.id; setPage('all'); updateCatActive(); renderGames(); };
    el.appendChild(div);
  });
}

function buildCatsBar() {
  const el = document.getElementById('cats-bar');
  const all = document.createElement('span');
  all.className = 'cat-pill active'; all.textContent = '🎮 הכל'; all.dataset.cat = 'all';
  all.onclick = () => { activeCat = 'all'; updateCatActive(); renderGames(); };
  el.appendChild(all);
  CATEGORIES.forEach(c => {
    const s = document.createElement('span');
    s.className = 'cat-pill'; s.textContent = c.label; s.dataset.cat = c.id;
    s.onclick = () => { activeCat = c.id; updateCatActive(); renderGames(); };
    el.appendChild(s);
  });
}

function updateCatActive() {
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === activeCat));
  document.querySelectorAll('#sidebar-cats .nav-item').forEach(p => p.classList.toggle('active', p.dataset.cat === activeCat));
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function setupNav() {
  document.querySelectorAll('[data-page]').forEach(el => {
    el.onclick = () => setPage(el.dataset.page);
  });
}
function setPage(p) {
  currentPage = p;
  document.getElementById('page-all').style.display     = p === 'all'     ? '' : 'none';
  document.getElementById('page-offline').style.display = p === 'offline' ? '' : 'none';
  document.querySelectorAll('.nav-item[data-page]').forEach(el => el.classList.toggle('active', el.dataset.page === p));
  if (p === 'offline') renderOfflineGames();
}

// ── Search ────────────────────────────────────────────────────────────────────
function setupSearch() {
  document.getElementById('search').addEventListener('input', e => { searchQ = e.target.value; renderGames(); });
}

// ── Render games ──────────────────────────────────────────────────────────────
function renderGames() {
  let games = allGames;
  if (activeCat !== 'all') games = games.filter(g => (g.categories || []).includes(activeCat));
  if (searchQ) {
    const q = searchQ.toLowerCase();
    games = games.filter(g => (g.name || g.title || '').toLowerCase().includes(q) || (g.description || '').toLowerCase().includes(q));
  }
  const el = document.getElementById('games-container');
  if (!games.length) { el.innerHTML = '<div class="empty"><div class="big">🎮</div>לא נמצאו משחקים</div>'; return; }
  el.innerHTML = '';
  const grid = document.createElement('div'); grid.className = 'games-grid';
  games.forEach(g => grid.appendChild(makeCard(g)));
  el.appendChild(grid);
}

function renderOfflineGames() {
  const el = document.getElementById('offline-games-container');

  // אם אופליין — הצג את כל המשחקים, אפורים אלה שלא הורדו
  if (window._isOffline && allGames.length) {
    el.innerHTML = '';
    const info = document.createElement('div');
    info.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:16px;padding:10px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);';
    info.textContent = '🔌 אין חיבור לאינטרנט — רק המשחקים השמורים זמינים';
    el.appendChild(info);
    const grid = document.createElement('div'); grid.className = 'games-grid';
    allGames.forEach(g => {
      const isSaved = savedGames.some(s => s.id === g.id);
      grid.appendChild(makeCard(g, true, !isSaved)); // unavailable=true אם לא שמור
    });
    el.appendChild(grid);
    return;
  }

  // מצב רגיל — רק המשחקים השמורים
  if (!savedGames.length) {
    el.innerHTML = '<div class="empty"><div class="big">💾</div>עדיין לא שמרת משחקים אופליין<br><small style="margin-top:8px;display:block;font-size:13px">לחץ על ☁️ בכרטיס משחק כדי לשמור</small></div>';
    return;
  }
  el.innerHTML = '';
  const grid = document.createElement('div'); grid.className = 'games-grid';
  savedGames.forEach(g => grid.appendChild(makeCard(g, true)));
  el.appendChild(grid);
}

function makeCard(g, isOfflinePage = false, unavailable = false) {
  const isSaved = savedGames.some(s => s.id === g.id);
  const div = document.createElement('div');
  div.className = 'game-card' + (unavailable ? ' unavailable' : '');
  div.innerHTML = `
    ${g.thumbnail ? `<img class="thumb" src="${g.thumbnail}" onerror="this.parentNode.querySelector('.thumb-placeholder').style.display='flex';this.remove()">` : ''}
    <div class="thumb-placeholder" style="${g.thumbnail ? 'display:none' : ''}">🎮</div>
    ${unavailable ? '<div class="unavailable-badge">🔌 לא זמין אופליין</div>' : ''}
    <div class="info">
      <div class="name">${g.name || g.title || 'משחק'}</div>
      <div class="tags">${(g.categories || []).map(c => CATEGORIES.find(x=>x.id===c)?.label || c).join(' · ') || 'ללא קטגוריה'}</div>
    </div>
    ${!unavailable ? `<button class="save-btn ${isSaved?'saved':''}" title="${isSaved?'הסר':'שמור אופליין'}">${isSaved?'✓ שמור':'☁️'}</button>` : ''}
    ${isSaved && !unavailable ? '<div class="offline-badge">📲 אופליין</div>' : ''}
  `;
  if (!unavailable) {
    div.onclick = () => {
      if (window._firebase) {
        window._firebase.logEvent(window._firebase.analytics, 'game_open', { game_id: g.id, game_name: g.name || g.title, platform: 'desktop' });
      }
      window.warp.openGame(g);
    };
    const saveBtn = div.querySelector('.save-btn');
    if (saveBtn) {
      saveBtn.onclick = async e => {
        e.stopPropagation();
        if (isSaved) {
          await window.warp.removeSavedGame(g.id);
          savedGames = await window.warp.getSavedGames();
          updateSavedCount();
          showToast('🗑️ הוסר מהמשחקים השמורים');
          renderGames();
          if (isOfflinePage) renderOfflineGames();
        } else {
          saveBtn.textContent = '⏳';
          const res = await window.warp.saveGameOffline(g);
          savedGames = await window.warp.getSavedGames();
          updateSavedCount();
          showToast('💾 ' + (res.msg || 'נשמר!'));
          renderGames();
        }
      };
    }
  }
  return div;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function updateSavedCount() {
  const el = document.getElementById('saved-count');
  el.textContent = savedGames.length;
  el.style.display = savedGames.length ? '' : 'none';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Window controls ───────────────────────────────────────────────────────────
function setupWindowControls() {
  document.getElementById('btn-min').onclick   = () => window.warp.windowMinimize();
  document.getElementById('btn-max').onclick   = () => window.warp.windowMaximize();
  document.getElementById('btn-close').onclick = () => window.warp.windowClose();
}

init();
</script>
